---
- name: Set git user name
  community.general.git_config:
    name: user.name
    scope: global
    value: "{{ git_user_name }}"
  when: git_user_name | length > 0

- name: Set git user email
  community.general.git_config:
    name: user.email
    scope: global
    value: "{{ git_user_email }}"
  when: git_user_email | length > 0

- name: Set git default branch
  community.general.git_config:
    name: init.defaultBranch
    scope: global
    value: "{{ git_default_branch }}"

- name: Set git editor
  community.general.git_config:
    name: core.editor
    scope: global
    value: "{{ git_editor }}"

- name: Enable git rerere
  community.general.git_config:
    name: rerere.enabled
    scope: global
    value: "true"

- name: Set pull strategy to rebase
  community.general.git_config:
    name: pull.rebase
    scope: global
    value: "true"
