---
- name: Set dock icon size
  community.general.osx_defaults:
    domain: com.apple.dock
    key: tilesize
    type: float
    value: "{{ dock_icon_size }}"
  notify: Restart Dock

- name: Set dock autohide
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: "{{ dock_autohide }}"
  notify: Restart Dock

- name: Minimize windows into application icon
  community.general.osx_defaults:
    domain: com.apple.dock
    key: minimize-to-application
    type: bool
    value: "{{ dock_minimize_to_application }}"
  notify: Restart Dock

- name: Show recent applications in dock
  community.general.osx_defaults:
    domain: com.apple.dock
    key: show-recents
    type: bool
    value: "{{ dock_show_recents }}"
  notify: Restart Dock

- name: Ensure dockutil is installed
  community.general.homebrew:
    name: dockutil
    state: present
  when: dock_apps | length > 0

- name: Get current dock apps
  ansible.builtin.command:
    cmd: dockutil --list
  register: dock_current
  changed_when: false
  when: dock_apps | length > 0

- name: Remove all dock items
  ansible.builtin.command:
    cmd: dockutil --remove all --no-restart
  when: dock_apps | length > 0 and dock_current.stdout_lines | length > 0
  changed_when: dock_current.stdout_lines | length > 0
  notify: Restart Dock

- name: Add dock items
  ansible.builtin.command:
    cmd: "dockutil --add '{{ item }}' --no-restart"
  loop: "{{ dock_apps }}"
  when: dock_apps | length > 0
  changed_when: true
  notify: Restart Dock
