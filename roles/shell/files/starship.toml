format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$docker_context\
$terraform\
$aws\
$gcloud\
$kubernetes\
$cmd_duration\
$battery\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold yellow"

[battery]
full_symbol = "🔋"
charging_symbol = "⚡"
discharging_symbol = "🔋"

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold blue"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold green"

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = "🐍 "

[nodejs]
format = "[$symbol($version )]($style)"
symbol = " "

[rust]
format = "[$symbol($version )]($style)"
symbol = "🦀 "

[golang]
format = "[$symbol($version )]($style)"
symbol = " "

[java]
format = "[$symbol($version )]($style)"
symbol = " "

[docker_context]
format = "[$symbol$context]($style) "
symbol = "🐳 "
only_with_files = true

[terraform]
format = "[$symbol$workspace]($style) "

[aws]
format = '[$symbol($profile )(\($region\) )]($style)'
symbol = "☁️ "

[gcloud]
format = '[$symbol$account(@$domain)(\($project\))]($style) '

[kubernetes]
disabled = true
format = '[$symbol$context( \($namespace\))]($style) '
